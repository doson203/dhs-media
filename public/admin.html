<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin - DHS MEDIA</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="shortcut icon" href="/assets/favicon.svg">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="admin-shell">
    <section class="admin-panel login-box" id="loginBox">
      <h1>Đăng nhập admin</h1>
      <p class="notice">Mật khẩu lấy từ biến môi trường <code>ADMIN_PASSWORD</code>.</p>
      <label class="field">Mật khẩu
        <input id="password" type="password" autocomplete="current-password">
      </label>
      <div class="admin-actions">
        <button class="save" id="loginBtn">Đăng nhập</button>
      </div>
      <p class="notice" id="loginMsg"></p>
    </section>

    <section class="admin-layout" id="adminApp" hidden>
      <aside class="admin-panel">
        <h2 id="adminTitle">Quản trị web</h2>
        <div class="admin-nav">
          <button data-tab="general" class="active">Thông tin chung</button>
          <button data-tab="apps">Tool Reup</button>
          <button data-tab="videoProducts">Video/Prompt AI</button>
          <button data-tab="workflows">Workflow</button>
          <button data-tab="pricing">Bảng giá</button>
          <button data-tab="demos">Video demo</button>
          <button data-tab="leads">Khách đăng ký</button>
          <button data-tab="faq">FAQ</button>
          <button data-tab="upload">Upload file</button>
          <button data-tab="json">JSON nâng cao</button>
        </div>
        <div class="admin-actions">
          <button class="save" id="saveBtn">Lưu thay đổi</button>
          <button id="logoutBtn">Đăng xuất</button>
        </div>
        <p class="notice" id="statusMsg"></p>
      </aside>

      <section class="admin-panel">
        <div data-panel="general"></div>
        <div data-panel="apps" hidden></div>
        <div data-panel="videoProducts" hidden></div>
        <div data-panel="workflows" hidden></div>
        <div data-panel="pricing" hidden></div>
        <div data-panel="demos" hidden></div>
        <div data-panel="leads" hidden></div>
        <div data-panel="faq" hidden></div>
        <div data-panel="upload" hidden></div>
        <div data-panel="json" hidden></div>
      </section>
    </section>
  </main>
  <script src="/admin.js"></script>
</body>
</html>
